name: CraftFlow CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Type Check
      run: npx tsc --noEmit
      
    - name: Run Linter
      run: npm run lint
      
    - name: Build
      run: npm run build
      env:
        # Ignore Supabase/DB connection during build if needed
        SKIP_ENV_VALIDATION: true
